<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a365d" />
    <meta name="application-name" content="مساعد المعلم الذكي" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="مساعد المعلم" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مساعد المعلم الذكي</title>
    <!-- Load fonts in HTML so they're ready before CSS applies (avoids @import async delay) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Hidden anchor for Google Translate widget; must exist before the GT script loads -->
    <div id="google_translate_element" style="position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;"></div>
    <script>
      window.googleTranslateElementInit = function () {
        var el = document.getElementById('google_translate_element');
        if (el && typeof google !== 'undefined' && google.translate && google.translate.TranslateElement) {
          new google.translate.TranslateElement(
            {
              pageLanguage: 'ar',
              includedLanguages: 'ar,en',
              layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
              autoDisplay: true,
            },
            'google_translate_element'
          );
        }
      };
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  </body>
</html>
